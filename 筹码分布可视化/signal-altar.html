<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Signal Altar</title>
    <link rel="stylesheet" href="./assets/css/shared.css" />
    <link rel="stylesheet" href="./assets/css/signal-altar.css" />
  </head>
  <body class="experience-body altar-page">
    <div class="hud minimal-hud">
      <button class="icon-button sound-toggle" data-sound-toggle aria-label="Toggle sound">
        <span class="icon icon-sound"></span>
      </button>
      <button class="icon-button reset-trigger" data-reset-scene aria-label="Reset scene">
        <span class="icon icon-reset"></span>
      </button>
      <button class="icon-button fullscreen-trigger" data-fullscreen aria-label="Toggle fullscreen">
        <span class="icon icon-fullscreen"></span>
      </button>
    </div>
    <canvas id="altar-canvas"></canvas>
    <script type="module" src="./assets/js/signal-altar/app.js"></script>
  </body>
</html>
